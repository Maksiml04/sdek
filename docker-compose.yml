services:
  rag-agent:
    build: .
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1  # ← добавьте эту строку
      - CHROMA_DB_PATH=/app/chroma_db
      - DATA_DIR=/app/data
    volumes:
      - ./data:/app/data:ro
      - ./chroma_db:/app/chroma_db